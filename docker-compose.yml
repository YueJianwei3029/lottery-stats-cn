version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: lottery_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-lottery123}
      MYSQL_DATABASE: lottery_db
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  app:
    build: .
    container_name: lottery_app
    restart: always
    expose:
      - "8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-lottery123}
      TZ: Asia/Shanghai
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: lottery_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mysql_data:
